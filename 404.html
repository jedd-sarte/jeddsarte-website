<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Page Not Found - Jedd Sarte</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--navy:#010829;--gold:#f49f1c;--white:#fff;--g400:#aaaabc;--g600:#666680}
body{font-family:'Inter',sans-serif;background:var(--navy);color:var(--white);min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:32px}
.wrap{max-width:480px}
.num{font-family:'DM Serif Display',serif;font-size:8rem;color:rgba(244,159,28,0.15);line-height:1;margin-bottom:8px}
h1{font-family:'DM Serif Display',serif;font-size:2rem;color:var(--white);margin-bottom:12px;font-weight:400}
h1 em{color:var(--gold);font-style:italic}
p{color:rgba(255,255,255,0.45);font-size:0.95rem;line-height:1.7;margin-bottom:32px}
.actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.btn-gold{background:var(--gold);color:var(--navy);padding:12px 24px;border-radius:8px;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:0.9rem;text-decoration:none;display:inline-block}
.btn-ghost{background:transparent;color:rgba(255,255,255,0.6);padding:12px 24px;border-radius:8px;border:1px solid rgba(255,255,255,0.15);font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:0.9rem;text-decoration:none;display:inline-block}
</style>
</head>
<body>
<div class="wrap">
  <div class="num">404</div>
  <h1>This page <em>doesn't exist.</em></h1>
  <p>The URL you're looking for isn't here. It may have moved, or the link you followed was incorrect.</p>
  <div class="actions">
    <a href="/" class="btn-gold">Go to Homepage</a>
    <a href="/blog/" class="btn-ghost">Browse the Blog</a>
  </div>
</div>
</body>
</html>
